<section class="py-10">
  <div class="container">

    <div class="bg-hero h-135 relative rounded-3xl overflow-hidden">

      <div class="absolute inset-0 bg-linear-to-r from-primary via-primary/65 to-transparent"></div>

      <div class="relative text-white p-5 md:pl-10 lg:pl-14 max-w-xl flex flex-col justify-center h-full gap-5">

        <div class="w-fit bg-[#FFB86A]/10 text-xs font-semibold text-orange-300 py-2 px-4 rounded-full flex items-center gap-2">
          <ng-icon name="lucideLeaf" />
          Farm-Fresh & Organic
        </div>

        <h1 class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl leading-tight">
          Nourish your home <br /> with
          <span class="text-[#FFB86A]"> Earth's finest </span>
        </h1>

        <p class="text-white/70 max-w-md leading-relaxed text-sm sm:text-base">
          Fresh, organic groceries delivered from local farms to your
          doorstep. Quality you can taste, convenience you deserve.
        </p>

        <div class="flex flex-col sm:flex-row items-center gap-4">
          <a routerLink="/products" class="w-full md:w-1/2 bg-orange-400 rounded-2xl py-3 px-6 font-semibold flex items-center justify-center gap-2 group transition hover:bg-orange-500">
            Shop Now
            <ng-icon class="transition group-hover:translate-x-1" name="lucideArrowRight" />
          </a>
          <a routerLink="/products" class="w-full md:w-1/2 bg-white/5 border border-white/20 rounded-2xl py-3 px-6 font-semibold flex items-center justify-center gap-2 group transition hover:bg-white/10">
            Browse Categories
          </a>
        </div>

      </div>

    </div>

  </div>
</section>
