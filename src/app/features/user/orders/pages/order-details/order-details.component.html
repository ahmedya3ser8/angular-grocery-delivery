<section class="py-10">
  <div class="container space-y-6">

    <a routerLink="/orders" class="flex items-center gap-1.5 text-[#6B7280] text-sm">
      <ng-icon name="lucideArrowLeft" />
      <span> Back to Orders </span>
    </a>

    <div class="flex justify-between items-center">
      <div class="space-y-1">
        <h1 class="text-2xl font-semibold text-[#1B3022]">
          Order #98D67DAD
        </h1>
        <p class="text-sm text-[#6B7280]">
          Placed on April 6, 2026
        </p>
      </div>
      <span class="bg-[#F973161A] text-[#F97316] py-2 px-4 rounded-2xl text-xs font-medium">
        Out for Delivery
      </span>
    </div>

    <div class="flex gap-6">

      <div class="flex-1 flex flex-col gap-6">
        <app-delivery-map />
        <app-delivery-progress />
      </div>

      <div class="w-sm flex flex-col gap-6">
        <app-delivery-address />
        <app-delivery-summary />
      </div>

    </div>

  </div>
</section>
