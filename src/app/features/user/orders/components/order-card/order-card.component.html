<a [routerLink]="['/orders', order().orderId]" class="block bg-white p-5 rounded-2xl space-y-4 transition hover:shadow-sm max-w-4xl">

  <div class="flex justify-between">

    <div class="space-y-1">
      <p class="text-sm font-medium text-[#1B3022]"> Order #{{ order().orderId }} </p>
      <div class="text-xs text-[#6B7280] flex items-center gap-2">
        <ng-icon name="lucideCalendar" />
        {{ order().date }}
      </div>
    </div>

    <div class="flex items-center gap-2">
      <span [ngClass]="{
        'bg-[#DCFCE7] text-[#008236]': order().status === 'Delivered',
        'bg-[#F973161A] text-[#F97316]': order().status === 'Out for Delivery',
        'bg-blue-100 text-blue-700': order().status === 'Placed'
      }" class="py-2 px-4 rounded-2xl text-xs font-medium">
        {{ order().status }}
      </span>
      <ng-icon class="text-[#6B7280]" name="lucideChevronRight" />
    </div>

  </div>

  <div class="flex items-center gap-2">
    @for (item of order().images; track $index) {
      <img [src]="item" class="size-12 sm:size-16 border border-[#E5E7EB] object-cover rounded-lg" alt="product" />
    }
  </div>

  <div class="flex justify-between items-center">
    <span class="text-sm text-[#6B7280]"> {{ order().items }} items </span>
    <span class="text-sm font-semibold text-[#1B3022]"> ${{ order().price.toFixed(2) }} </span>
  </div>

</a>
