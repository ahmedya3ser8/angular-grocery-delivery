<div class="bg-white border border-[#E5E7EB] rounded-2xl p-5 flex items-center justify-between">
  <div class="flex flex-col">
    <span class="text-2xl font-semibold text-[#18181B]"> {{ value() }} </span>
    <span class="text-sm text-[#6B7280]"> {{ title() }} </span>
  </div>
  <div class="size-10 bg-[#FFF7ED] rounded-xl flex justify-center items-center">
    <ng-icon class="text-xl text-[#F54900]!" [name]="icon()" />
  </div>
</div>
